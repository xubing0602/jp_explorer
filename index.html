<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本市町村去过地图</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">日本市町村去过地图</div>
          <div class="subtitle">点击市町村，标记你去过的地方</div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">已标记</div>
            <div class="stat-value" id="visitedCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">总计</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="panel-title">操作</div>
          <button id="exportBtn" class="btn">导出 JSON</button>
          <label class="btn ghost" for="importInput">导入 JSON</label>
          <input id="importInput" type="file" accept="application/json" hidden />
          <button id="clearBtn" class="btn ghost">清空标记</button>

          <div class="panel-title">说明</div>
          <p class="hint">
            标记数据会保存在本地浏览器 <code>localStorage</code>，可用导出/导入进行迁移。
          </p>

          <div class="panel-title">图例</div>
          <div class="legend">
            <span class="swatch visited"></span>
            <span>去过</span>
            <span class="swatch"></span>
            <span>未去过</span>
          </div>

          <div id="status" class="status">正在加载行政区数据...</div>
        </section>

        <section class="map-wrap">
          <div id="map"></div>
        </section>
      </main>

      <footer class="footer">
        <div>
          数据来源：国土数值信息（行政区域データ N03，基准日 2025-01-01）
        </div>
        <div>
          地图底图：© OpenStreetMap contributors
        </div>
      </footer>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
