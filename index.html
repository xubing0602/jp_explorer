<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本市町村去过地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">日本市町村去过地图</div>
          <div class="subtitle">在 CSV 里更新拜访程度，地图自动映射颜色</div>
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">已标记</div>
            <div class="stat-value" id="visitedCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">总计</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="panel-title">操作</div>
          <button id="exportBtn" class="btn">下载 CSV</button>
          <label class="btn ghost" for="importInput">导入 CSV</label>
          <input id="importInput" type="file" accept=".csv,text/csv" hidden />

          <div class="panel-title">说明</div>
          <p class="hint">
            CSV 位于 <code>data/visits.csv</code>，包含三列：都道府县、市町村、拜访程度（空=未去过，1-5
            由浅到深）。
          </p>

          <div class="panel-title">图例</div>
          <div class="legend">
            <span class="swatch level-0"></span>
            <span>未去过</span>
            <span class="swatch level-1"></span>
            <span>路过</span>
            <span class="swatch level-2"></span>
            <span>接地</span>
            <span class="swatch level-3"></span>
            <span>访问</span>
            <span class="swatch level-4"></span>
            <span>宿泊</span>
            <span class="swatch level-5"></span>
            <span>居住</span>
          </div>

          <div id="status" class="status">正在加载行政区数据...</div>
        </section>

        <section class="map-wrap">
          <div id="map"></div>
        </section>
      </main>

      <footer class="footer">
        <div>
          数据来源：国土数值信息（行政区域データ N03，基准日 2025-01-01）
        </div>
        <div>
          地图底图：© OpenStreetMap contributors / © CARTO
        </div>
      </footer>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
