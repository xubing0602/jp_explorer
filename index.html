<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>日本市町村解锁地图</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/app.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="title">日本市町村解锁地图</div>
          <!-- <div class="subtitle">在 CSV 里更新拜访程度，地图自动映射颜色</div> -->
        </div>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">市町村总计</div>
            <div class="stat-value" id="totalCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">已解锁市町村</div>
            <div class="stat-value" id="visitedCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">已解锁县</div>
            <div class="stat-value" id="visitedPrefCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">已探索市町村</div>
            <div class="stat-value" id="exploredCount">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">已探索县</div>
            <div class="stat-value" id="exploredPrefCount">0</div>
          </div>
        </div>
        <div class="legend legend-inline">
          <span class="swatch level-0"></span>
          <span>未去过</span>
          <span class="swatch level-1"></span>
          <span>路过</span>
          <span class="swatch level-2"></span>
          <span>接地</span>
          <span class="swatch level-3"></span>
          <span>访问</span>
          <span class="swatch level-4"></span>
          <span>宿泊</span>
          <span class="swatch level-5"></span>
          <span>居住</span>
        </div>
      </header>

      <main class="content">
        <section class="map-wrap">
          <div id="map"></div>
        </section>

        <section class="analytics">
          <div class="analytics-grid">
            <div class="card">
              <div class="card-title">拜访程度分布</div>
              <div id="levelBars" class="bars"></div>
            </div>
            <div class="card">
              <div class="card-title">全局概览</div>
              <div class="metric-list" id="globalMetrics"></div>
            </div>
          </div>

          <div class="table-card">
            <div class="table-title">各县解锁比例</div>
            <div class="table-hint">可点击表头排序</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>                 
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="pref">都道府县</button>
                    </th>
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="total">总市町村</button>
                    </th>   
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="visited">已解锁市町村</button>
                    </th>

                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="ratio">解锁比例</button>
                    </th>
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="explored">已探索市町村</button>
                    </th>
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="exploredRatio">探索比例</button>
                    </th>                    
                    <th>
                      <button class="sort-btn" data-table="coverage" data-key="avg">平均解锁程度</button>
                    </th>
                  </tr>
                </thead>
                <tbody id="prefCoverageBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div>
          数据来源：国土数值信息（行政区域データ N03，基准日 2025-01-01）
        </div>
      </footer>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAaFVpZPOA89d58t7aKdjlaM6qTKHynx_c"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
